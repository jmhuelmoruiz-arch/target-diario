name: Edicion matinal de Target

on:
  schedule:
    - cron: "30 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publicar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install feedparser requests

      - name: Generar edicion
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cat > backend.py <<'FIN_DEL_SCRIPT'
          import feedparser, json, os, re, time, requests
          from datetime import datetime, timezone

          FEEDS = {
              "El Pais":         "https://feeds.elpais.com/mrss-s/pages/ep/site/elpais.com/portada",
              "El Mundo":        "https://e00-elmundo.uecdn.es/elmundo/rss/portada.xml",
              "ABC":             "https://www.abc.es/rss/2.0/portada/",
              "eldiario.es":     "https://www.eldiario.es/rss/",
              "La Vanguardia":   "https://www.lavanguardia.com/rss/home.xml",
              "El Confidencial": "https://rss.elconfidencial.com/espana/",
              "20minutos":       "https://www.20minutos.es/rss/",
          }
          MAX_POR_MEDIO = 15
          MAX_HISTORIAS = 6
          API_URL = "https://api.anthropic.com/v1/messages"
          API_KEY = os.environ["ANTHROPIC_API_KEY"].strip()
          MODELO_RAPIDO = "claude-haiku-4-5"
          MODELO_BUENO = "claude-sonnet-5"

          def fetch_headlines():
              items = []
              for outlet, url in FEEDS.items():
                  try:
                      feed = feedparser.parse(url)
                      for e in feed.entries[:MAX_POR_MEDIO]:
                          t = e.get("title", "").strip()
                          if t:
                              items.append({"outlet": outlet, "title": t, "link": e.get("link", "")})
                  except Exception as err:
                      print("[aviso] " + outlet + ": " + str(err))
              print("Leidos " + str(len(items)) + " titulares.")
              return items

          def claude(prompt, system, modelo, max_tokens=2000, intentos=3):
              for n in range(1, intentos + 1):
                  r = requests.post(
                      API_URL,
                      headers={"x-api-key": API_KEY,
                               "anthropic-version": "2023-06-01",
                               "content-type": "application/json"},
                      json={"model": modelo, "max_tokens": max_tokens,
                            "system": system,
                            "messages": [{"role": "user", "content": prompt}]},
                      timeout=180,
                  )
                  if r.status_code == 200:
                      bloques = r.json().get("content", [])
                      texto = "".join(b.get("text", "") for b in bloques
                                      if b.get("type") == "text")
                      if texto.strip():
                          return texto
                      print("[aviso] respuesta sin bloque de texto")
                      raise RuntimeError("respuesta vacia")
                  print("[API " + str(r.status_code) + "] " + r.text[:400])
                  if r.status_code in (401, 403):
                      raise SystemExit("Clave rechazada. Revisa el secret ANTHROPIC_API_KEY y el saldo en console.anthropic.com")
                  if n < intentos:
                      time.sleep(5 * n)
                      continue
                  r.raise_for_status()
              raise RuntimeError("Sin respuesta")

          def parse_json(text):
              limpio = re.sub(r"```(?:json)?", "", text).strip()
              m = re.search(r"[\[{].*[\]}]", limpio, re.DOTALL)
              if not m:
                  raise ValueError("Sin JSON: " + text[:200])
              return json.loads(m.group())

          def cluster_stories(headlines):
              listado = "\n".join(str(i) + ". [" + h["outlet"] + "] " + h["title"]
                                  for i, h in enumerate(headlines))
              system = ("Eres un editor de mesa. Agrupas titulares que cubren EL MISMO hecho "
                        "noticioso concreto: mismo suceso, mismo dia, mismos protagonistas. "
                        "Dos piezas del mismo tema general pero distintos hechos NO van juntas. "
                        "Respondes SOLO con JSON.")
              prompt = ("Titulares de hoy:\n\n" + listado +
                        "\n\nDevuelve un array JSON de grupos. Cada grupo es un array con los "
                        "indices de los titulares que cubren el mismo hecho. Solo grupos con "
                        "piezas de AL MENOS 3 medios distintos. Ordena de mayor a menor "
                        "cobertura. Maximo " + str(MAX_HISTORIAS) + " grupos. "
                        "Formato: [[0,12,31],[4,18,22]]")
              return parse_json(claude(prompt, system, MODELO_RAPIDO))[:MAX_HISTORIAS]

          def analyze(cluster, todos_los_medios):
              piezas = "\n".join(str(i) + ". [" + h["outlet"] + "] " + h["title"]
                                 for i, h in enumerate(cluster))
              system = ("Eres el redactor jefe de Target, un medio cuya promesa es hacer "
                        "visible el encuadre editorial SIN INVENTARLO. Prefieres decir que "
                        "no hay divergencia antes que fabricar una. REGLA INNEGOCIABLE: en "
                        "'facts' solo entra informacion deducible de los titulares "
                        "aportados; cuando dos medios den cifras distintas, atribuye cada "
                        "una a su medio. Responde SOLO JSON.")
              prompt = ("Piezas de hoy sobre el mismo hecho (cada una con su indice):\n\n" +
                        piezas +
                        "\n\nPASO 1. Clasifica el tipo de divergencia entre estos titulares:\n"
                        "- 'editorial': difieren en la causa atribuida, el responsable "
                        "senalado, el protagonista elegido o el juicio implicito. Son dos "
                        "lecturas distintas del mismo hecho.\n"
                        "- 'cronologica': dicen lo mismo pero en momentos distintos. Cifras "
                        "que crecen, situaciones que evolucionan, uno actualizo antes que "
                        "otro. NO es sesgo, es hora de cierre.\n"
                        "- 'ninguna': todos cuentan lo mismo del mismo modo.\n\n"
                        "Se estricto: ante la duda entre 'editorial' y 'cronologica', elige "
                        "'cronologica'. Acusar de sesgo a quien solo publico antes es un "
                        "error grave.\n\n"
                        "PASO 2. Si y solo si el tipo es 'editorial': nombra el eje concreto "
                        "de esta historia con sus dos polos, ordena las piezas a lo largo de "
                        "ese eje y reparte posiciones usando TODO el rango (la mas cercana a "
                        "un polo entre 0 y 15; la del polo opuesto entre 85 y 100). Es una "
                        "ordenacion RELATIVA entre estas piezas.\n"
                        "Si el tipo es 'cronologica' o 'ninguna': eje null y todas las "
                        "posiciones a 50.\n\n"
                        "Devuelve este JSON. Incluye UNA entrada en 'frames' por cada pieza "
                        "listada arriba, con su 'idx' exacto:\n"
                        '{"neutral_headline": "titular descriptivo sin adjetivos valorativos",\n'
                        ' "section": "Politica | Economia | Internacional | Sociedad | Cultura | Deportes",\n'
                        ' "facts": ["hecho verificable 1", "hecho 2"],\n'
                        ' "tipo_divergencia": "editorial | cronologica | ninguna",\n'
                        ' "eje": {"polo_a": "etiqueta breve del extremo 0", '
                        '"polo_b": "etiqueta breve del extremo 100", '
                        '"resumen": "en una frase, en que se dividen los medios"},\n'
                        ' "frames": [{"idx": 0, "position": 0, '
                        '"focus": "que destaca y que omite este encuadre"}]}')
              data = parse_json(claude(prompt, system, MODELO_BUENO))

              tipo = data.get("tipo_divergencia", "ninguna")
              if tipo != "editorial":
                  data["eje"] = None

              # Enlaces y titulares por PIEZA (via idx), no por medio:
              # un mismo medio puede publicar dos piezas del mismo hecho.
              frames = []
              for f in data.get("frames", []):
                  i = f.get("idx")
                  if not isinstance(i, int) or i < 0 or i >= len(cluster):
                      continue
                  pieza = cluster[i]
                  pos = f.get("position", 50)
                  if tipo != "editorial":
                      pos = 50
                  frames.append({
                      "outlet": pieza["outlet"],
                      "headline": pieza["title"],
                      "link": pieza["link"],
                      "position": pos,
                      "focus": f.get("focus", ""),
                  })
              data["frames"] = frames

              # Discrepancia medida, no opinada: dispersion real de posiciones.
              if tipo == "editorial" and len(frames) > 1:
                  posiciones = [f["position"] for f in frames]
                  rango = max(posiciones) - min(posiciones)
                  data["rango"] = rango
                  data["discrepancia"] = ("alta" if rango >= 60 else
                                          "media" if rango >= 30 else "baja")
              else:
                  data["rango"] = 0
                  data["discrepancia"] = "baja"

              cubren = set(f["outlet"] for f in frames)
              data["silenciosos"] = sorted(m for m in todos_los_medios if m not in cubren)
              return data

          def main():
              headlines = fetch_headlines()
              if not headlines:
                  raise SystemExit("Ningun RSS respondio.")
              grupos = cluster_stories(headlines)
              print("Detectadas " + str(len(grupos)) + " historias.")
              historias = []
              for idx, indices in enumerate(grupos, 1):
                  cluster = [headlines[i] for i in indices
                             if isinstance(i, int) and i < len(headlines)]
                  if len(set(h["outlet"] for h in cluster)) < 3:
                      print("  historia " + str(idx) + " descartada: menos de 3 medios")
                      continue
                  print("  analizando historia " + str(idx) + " (" + str(len(cluster)) + " piezas)")
                  try:
                      historias.append(analyze(cluster, list(FEEDS.keys())))
                  except Exception as err:
                      print("  [aviso] descartada: " + str(err))
              if not historias:
                  raise SystemExit("Ninguna historia supero el analisis.")
              os.makedirs("docs", exist_ok=True)
              with open("docs/data.json", "w", encoding="utf-8") as f:
                  json.dump({"fecha": datetime.now(timezone.utc).isoformat(),
                             "historias": historias}, f, ensure_ascii=False, indent=2)
              print("Edicion publicada: " + str(len(historias)) + " historias.")

          main()
          FIN_DEL_SCRIPT
          python backend.py

      - name: Publicar
        run: |
          git config user.name "target-bot"
          git config user.email "bot@target"
          git add docs/data.json
          git commit -m "Edicion $(date +%F)" || echo "Sin cambios"
          git push
